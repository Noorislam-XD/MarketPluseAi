name: Market Pulse Bot

on:
  schedule:
    # Times are UTC. Assumes IST (Asia/Kolkata, UTC+5:30) for the Indian-market audience:
    - cron: "30 2 * * *"  # 08:00 IST — Daily Market Brief
    - cron: "30 7 * * *"  # 13:00 IST — Midday Update
    - cron: "30 14 * * *" # 20:00 IST — Market Close Summary
  workflow_dispatch:
    inputs:
      brief_type:
        description: "Brief type label to use for a manual run"
        required: false
        default: "🌍 Market Brief"

permissions:
  contents: write

jobs:
  run-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm config set fetch-timeout 300000
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 3
          npm ci

      - name: Determine brief type
        id: brief
        run: |
          case "${{ github.event.schedule }}" in
            "30 2 * * *") echo "type=🌅 Daily Market Brief" >> "$GITHUB_OUTPUT" ;;
            "30 7 * * *") echo "type=🌍 Midday Update" >> "$GITHUB_OUTPUT" ;;
            "30 14 * * *") echo "type=🌙 Market Close Summary" >> "$GITHUB_OUTPUT" ;;
            *) echo "type=${{ github.event.inputs.brief_type || '🌍 Market Brief' }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run MarketPulseAI
        env:
          BRIEF_TYPE: ${{ steps.brief.outputs.type }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node bot.js

      - name: Commit updated history.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "chore: update market pulse history [skip ci]"
          git push
